<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurum · Onyx &amp; Rose Gold</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;700&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;700&family=Geist+Mono:wght@400;700&family=Manrope:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: "Schibsted Grotesk", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #0B0B0D;
    color: #F2EDE6;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  @keyframes au-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes au-ground {
    from { transform: translateX(0); }
    to   { transform: translateX(-90px); }
  }
  @keyframes au-shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .num, [class*="mono"] { font-feature-settings: "tnum" 1, "ss01" 1; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
